# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - xr-messaging

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --force

      # Create the build directory structure that 'serve' expects
      - name: Prepare frontend files
        working-directory: frontend
        run: |
          mkdir -p build
          cp index.html *.js *.css build/

      # Copy frontend to backend/public (for your backend to serve)
      - name: Copy frontend to backend
        run: |
          mkdir -p backend/public
          cp -r frontend/build/* backend/public/

      - name: Install backend dependencies
        working-directory: backend
        run: npm install --force

      - name: Zip backend for deployment
        run: |
          cd backend
          zip -r ../release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-release
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-release

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'xr-messagibg'
          slot-name: 'Production'
          package: release.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_3C2B94ED3D0D467E86BF4F087B6334E4 }}
