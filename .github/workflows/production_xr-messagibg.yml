name: Build and deploy Node.js backend to Azure Web App - xr-messagibg

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      - name:  Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'

      - name:  Install root dependencies (e.g. npm-run-all)
        run: npm install

      - name:  Install frontend dependencies
        working-directory: frontend
        run: npm install --force

      - name:  Build frontend
        working-directory: frontend
        run: npm run build

      - name:  Copy built frontend to backend/public
        run: |
          mkdir -p backend/public
          cp -r frontend/build/* backend/public/
        # For Angular, use:
        # cp -r frontend/dist/<your-project-name>/* backend/public/

      - name:  Install backend dependencies
        working-directory: backend
        run: npm install --force

      - name:  Zip backend for deployment
        working-directory: backend
        run: zip -r ../release.zip .

      - name:  Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-release
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name:  Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-release

      - name:  Unzip artifact
        run: unzip release.zip

      - name:  Remove zip file
        run: rm release.zip

      - name:  Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'xr-messagibg'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B13970A649E545C293BE9252353C16B1 }}
          package: .
