# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - xr-messagibg

on:
  push:
    branches: [production]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'

      # Frontend preparation
      - name: Prepare frontend
        working-directory: frontend
        run: |
          mkdir -p ../backend/public
          cp index.html main.js renderer.js styles.css ../backend/public/

      # Backend setup
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --production

      # Verify critical files
      - name: Verify configuration
        working-directory: backend
        run: |
          [ -f server.js ] || { echo "ERROR: server.js missing"; exit 1; }
          grep -q "process.env.PORT" server.js || { echo "ERROR: Must use process.env.PORT"; exit 1; }

      # Deploy
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: xr-messaging
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_F686C13FE2954C6FAEF2D327F4D8339B }}
          package: ./backend