# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - xr-messagibg


on:
  push:
    branches:
      - production  # or your main branch (e.g. staging or production)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install frontend dependencies
      working-directory: ./desktop-app
      run: npm install

    - name: Install backend dependencies
      working-directory: ./server
      run: npm install

    # Optional: build if needed (like for React/Angular/Vite)
    # - name: Build frontend
    #   working-directory: ./desktop-app
    #   run: npm run build

    # Optional: Move static frontend files to backend if server serves them
    - name: Copy frontend to backend (if needed)
      run: |
        mkdir -p server/public
        cp -r desktop-app/* server/public/

    - name: Zip deployment package
      run: |
        zip -r deploy.zip server node_modules package.json package-lock.json

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: xr-messagibg
        slot-name: production
        package: ./server
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B13970A649E545C293BE9252353C16B1 }} 
