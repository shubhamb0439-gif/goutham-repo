# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - xr-messagibg

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'

      # Frontend preparation
      - name: Prepare frontend files
        working-directory: frontend
        run: |
          # Create the public directory in backend if it doesn't exist
          mkdir -p ../backend/public
          # Copy all frontend files to backend's public directory
          cp -r ./* ../backend/public/

      # Backend setup
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Ensure correct package.json
        working-directory: backend
        run: |
          # Only modify package.json if needed, preserving other settings
          if [ ! -f package.json ]; then
            echo '{"name": "xr-backend", "version": "1.0.0", "main": "server.js", "scripts": {"start": "node server.js"}}' > package.json
          else
            # Ensure start script exists
            npm pkg set scripts.start="node server.js"
          fi

      # Deployment
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: xr-messagibg  # Fixed typo from original
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_F686C13FE2954C6FAEF2D327F4D8339B }}
          package: ./backend