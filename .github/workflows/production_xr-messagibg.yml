# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - xr-messagibg

on:
  push:
    branches: [production]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      # Install root dependencies (if any)
      - name: Install root dependencies
        run: npm install

      # Install backend dependencies
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # Start application (simulating local workflow)
      - name: Run application
        run: npm start

      # Prepare backend with frontend files
      - name: Prepare deployment package
        run: |
          mkdir -p backend/public
          cp frontend/index.html frontend/main.js frontend/renderer.js frontend/styles.css backend/public/

      # Deploy to Azure
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: xr-messaging
          slot-name: Production
          package: ./backend
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_F686C13FE2954C6FAEF2D327F4D8339B }}
