<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>XR Vision</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest">


    <!-- Device-only PWA -->
    <!-- <link rel="manifest" href="/device.webmanifest"> -->
    <link rel="icon" href="/public/images/xr-logo-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/public/images/xr-logo-192.png" />

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/device-orb.css" />
</head>

<body>
    <div class="shell" id="shell">
        <canvas id="sc"></canvas>

        <!-- XR Vision Logo -->
        <div class="logo">
            <svg viewBox="0 0 220 130" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="xg" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#4fc3f7"/>
                        <stop offset="40%" stop-color="#5c6bc0"/>
                        <stop offset="100%" stop-color="#7b1fa2"/>
                    </linearGradient>
                    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#5c6bc0"/>
                        <stop offset="100%" stop-color="#7b1fa2"/>
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="1.5" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                <path d="M5 8 L32 52 L5 96 L22 96 L40 65 L58 96 L75 96 L48 52 L75 8 L58 8 L40 39 L22 8 Z"
                    fill="url(#xg)" filter="url(#glow)"/>
                <path d="M82 8 L82 96 L98 96 L98 60 L118 96 L136 96 L114 57 C126 53 133 44 133 32 C133 18 123 8 108 8 Z
                         M98 20 L106 20 C114 20 118 25 118 32 C118 39 114 44 106 44 L98 44 Z"
                    fill="url(#rg)" filter="url(#glow)"/>
                <polyline points="140,52 152,52 158,34 164,70 170,42 176,62 182,52 210,52"
                    stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                    fill="none" filter="url(#glow)"/>
                <rect x="194" y="18" width="6" height="24" rx="2" fill="#00e5ff"/>
                <rect x="186" y="26" width="22" height="6" rx="2" fill="#00e5ff"/>
                <ellipse cx="185" cy="72" rx="32" ry="9"
                    stroke="#00e5ff" stroke-width="1.8" fill="none" opacity=".7"
                    transform="rotate(-12 185 72)"/>
                <text x="48" y="120" font-family="'Orbitron',sans-serif" font-size="18"
                    font-weight="600" fill="#ccc" letter-spacing="10" text-anchor="middle">VISION</text>
            </svg>
        </div>

        <!-- Status badge -->
        <div class="badge" id="badge">
            <div class="bdot off" id="bdot"></div>
            <span class="btxt off" id="btxt">DISCONNECTED</span>
        </div>

        <!-- ORB -->
        <div class="orb-root" id="orbVisual">
            <div class="halo"></div>
            <div class="ground"></div>
            <div class="ring-spin"></div>
            <div class="ring-spin-border"></div>
            <div class="ring-inner"></div>
            <div class="sphere">
                <div class="nebula"></div>
                <canvas id="wc"></canvas>
            </div>
        </div>

        <!-- Response box -->
        <div class="resp" id="responseCard">
            <div class="pbtn" id="btnAudio" style="cursor:pointer;">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <path d="M2.5 1.5L11 6.5L2.5 11.5V1.5Z" fill="rgba(0,207,255,.92)"/>
                </svg>
            </div>
            <div class="rtxt" id="responseText">Your XR assistant response appears here...</div>
        </div>

        <!-- Mic button -->
        <div class="mic-wrap">
            <div class="mic-zone" id="micButton">
                <div class="mic-btn" id="mb">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <rect x="9" y="2" width="10" height="15" rx="5" fill="rgba(0,215,255,.92)"/>
                        <path d="M4 13C4 18.5 8.5 23 14 23" stroke="rgba(0,215,255,.92)" stroke-width="2" stroke-linecap="round" fill="none"/>
                        <path d="M24 13C24 18.5 19.5 23 14 23" stroke="rgba(0,215,255,.92)" stroke-width="2" stroke-linecap="round" fill="none"/>
                        <line x1="14" y1="23" x2="14" y2="27" stroke="rgba(0,215,255,.92)" stroke-width="2" stroke-linecap="round"/>
                        <line x1="10" y1="27" x2="18" y2="27" stroke="rgba(0,215,255,.92)" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
            <div class="mic-lbl" id="micInstruction">Hold to <b>Speak</b></div>
        </div>

        <div class="toast" id="toast"></div>

        <!-- Hidden functional elements for ui.js -->
        <div id="status" class="status status-disconnected" hidden>Status: Disconnected</div>
        <div id="chipLastCmd" hidden>Heard: ...</div>

        <div class="hidden-controls" hidden>
            <input id="deviceXrIdInput" placeholder="Enter Device XR ID (e.g. 1234)" />
            <button id="btnConnect">Connect</button>
            <button id="btnStream">Start Stream</button>
            <button id="btnMute">Mute</button>
            <button id="btnVideo">Hide Video</button>
            <button id="btnVoice">Start Voice</button>
            <button id="btnStartRec">Start Recording</button>
            <button id="btnStopRec">Stop Recording</button>
        </div>

        <video id="preview" autoplay playsinline webkit-playsinline muted hidden></video>
        <div id="noStream" hidden>Stream not ready</div>

        <div class="hidden-controls" hidden>
            <div id="msgList"></div>
            <input id="msgInput" placeholder="Type a message..." />
            <input id="chkUrgent" type="checkbox" />
            <button id="btnSend">Send</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/public/js/config.js"></script>

    <!-- Canvas rendering (starfield + wave) -->
    <script src="/public/js/device-canvas.js"></script>

    <script type="module" src="/public/js/ui.js"></script>

    <script>
        async function maybeRegisterSW() {
            if (!('serviceWorker' in navigator)) return;
            if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return;
            if (!location.pathname.startsWith('/device')) return;
            try {
                const response = await fetch('/device/sw.js', { method: 'HEAD' });
                if (response.status !== 200) return;
                const registration = await navigator.serviceWorker.register('/device/sw.js', { scope: '/device/' });
                console.log('[SW] Registered successfully', registration.scope);
            } catch (err) {
                console.warn('[SW] Registration failed:', err.message);
            }
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', maybeRegisterSW);
        } else {
            maybeRegisterSW();
        }
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const btn = document.querySelector('[data-install]');
            if (btn) btn.style.display = 'inline-flex';
        });
        document.querySelector('[data-install]')?.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
        });
    </script>
</body>

</html>
